services:
  chirpstack-mqtt:
    image: eclipse-mosquitto:2.0
    container_name: chirpstack-mqtt
    restart: unless-stopped
    ports:
      - "1884:1883"
    volumes:
      - ./chirpstack-mqtt/mosquitto.conf:/mosquitto/config/mosquitto.conf
    networks:
      - lorawan-net
      - backend-iot-network

  chirpstack:
    image: chirpstack/chirpstack:4
    container_name: chirpstack
    command: --config /etc/chirpstack
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./chirpstack:/etc/chirpstack
    environment:
      - TZ=Europe/Madrid
      - CHIRPSTACK_SECRET=696f31438154e577824eda8229ca23a0285145b4fb20631ba7c33447706c6da8
    networks:
      - lorawan-net
      - backend-iot-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      chirpstack-mqtt:
        condition: service_started

  chirpstack-rest-api:
    image: chirpstack/chirpstack-rest-api:4
    container_name: chirpstack-rest-api
    restart: unless-stopped
    ports:
      - "8090:8090"
    command: --server chirpstack:8080 --bind 0.0.0.0:8090 --insecure
    networks:
      - lorawan-net
      - backend-iot-network
    depends_on:
      - chirpstack

  postgres:
    image: postgres:16-alpine
    container_name: chirpstack-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=chirpstack
      - POSTGRES_USER=chirpstack
      - POSTGRES_PASSWORD=chirpstack_espurna
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chirpstack"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    networks:
      - lorawan-net
      - backend-iot-network

  redis:
    image: redis:7-alpine
    container_name: chirpstack-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - lorawan-net

networks:
  lorawan-net:
    driver: bridge
  backend-iot-network:
    external: true
    name: backend-server_iot-network

volumes:
  postgres-data:
  redis-data: