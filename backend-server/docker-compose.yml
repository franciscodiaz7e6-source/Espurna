services:
  mosquitto:
    image: eclipse-mosquitto:2.0.22
    container_name: mqtt-broker
    restart: unless-stopped
    hostname: mqtt-broker
    ports:
      - "1883:1883"
      - "8883:8883"
    volumes:
      - ./mqtt/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./mqtt/certs:/mosquitto/certs
      - ./mqtt/passwd:/mosquitto/config/passwd:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-logs:/mosquitto/log
    environment:
      - TZ=Europe/Madrid
    networks:
      - iot-network
    healthcheck:
      test: ["CMD", "sh", "-c", "mosquitto_sub -h localhost -u monitor_user -P pirineus -t test -C 1 || exit 0"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: homeassistant
    restart: unless-stopped
    hostname: homeassistant
    ports:
      - "8123:8123"
    environment:
      - TZ=Europe/Madrid
    volumes:
      - ha-config:/config
      - /etc/localtime:/etc/localtime:ro
      - /run/dbus:/run/dbus:ro
      - ./mqtt/certs/ca.crt:/config/certs/ca.crt:ro
      - ./mqtt/certs/server.crt:/config/certs/server.crt:ro
      - ./mqtt/certs/server.key:/config/certs/server.key:ro
    networks:
      - iot-network
    depends_on:
      mosquitto:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8123/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  influxdb:
    image: influxdb:2.7-alpine
    container_name: influxdb
    restart: unless-stopped
    hostname: influxdb
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=${INFLUXDB_USER}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUXDB_PASSWORD}
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUX_ORG}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUX_BUCKET}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_ADMIN_TOKEN}
      - DOCKER_INFLUXDB_INIT_RETENTION=${INFLUXDB_RETENTION}
      - TZ=Europe/Madrid
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - influxdb-config:/etc/influxdb2
      - ./influxdb/init.sh:/docker-entrypoint-initdb.d/init.sh:ro
    networks:
      - iot-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  node-red:
    build: ./node-red
    container_name: node-red
    restart: unless-stopped
    hostname: node-red
    ports:
      - "1880:1880"
    environment:
      - NODE_RED_ENABLE_PROJECTS=true
      - NODE_RED_ENABLE_SAFE_MODE=false
      - TZ=Europe/Madrid
      - NODE_OPTIONS=--max-old-space-size=256
    volumes:
      - node-red-data:/data
      - ./node-red/settings.js:/data/settings.js
      - ./node-red/ca.crt:/data/certs/ca.crt:ro
    networks:
      - iot-network
    depends_on:
      influxdb:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1880/nodered/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  grafana:
    image: grafana/grafana:11.4.0
    container_name: grafana
    restart: unless-stopped
    hostname: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_SERVER_DOMAIN=f0929359-581e-4924-906b.353de71f3930.isard.nuvulet.itb.cat
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - TZ=Europe/Madrid
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
      - INFLUXDB_ADMIN_TOKEN=${INFLUXDB_ADMIN_TOKEN}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - iot-network
    depends_on:
      influxdb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:alpine
    container_name: nginx-espurna
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - INFLUX_TOKEN=${INFLUX_TOKEN}
      - CHIRPSTACK_KEY=${CHIRPSTACK_KEY}
      - MAPTILER_KEY=${MAPTILER_KEY}
      - CESIUM_TOKEN=${CESIUM_TOKEN}
      - MAPBOX_TOKEN=${MAPBOX_TOKEN}
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/entrypoint.sh:/entrypoint.sh
      - /home/isard/certs/fullchain.pem:/etc/nginx/ssl/fullchain.pem:ro
      - /home/isard/certs/privkey.pem:/etc/nginx/ssl/privkey.pem:ro
      - ./mi-web-html-espurna:/usr/share/nginx/html
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    networks:
      - iot-network
    depends_on:
      homeassistant:
        condition: service_healthy
      node-red:
        condition: service_healthy
      grafana:
        condition: service_healthy

  espurna-ai-bot:
    image: python:3.11-slim
    container_name: espurna-ai-bot
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./ai-bot:/app
    command: sh -c "pip install -q -r requirements.txt && python bot.py"
    env_file:
      - .env
    networks:
      - iot-network
    depends_on:
      - influxdb

networks:
  iot-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.18.0.0/16

volumes:
  mosquitto-data:
  mosquitto-logs:
  influxdb-data:
  influxdb-config:
  node-red-data:
  grafana-data:
  ha-config:
