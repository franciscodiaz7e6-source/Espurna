# Mosquitto MQTT Broker Configuration - CORREGIDO
# Puerto 1883: Plain MQTT (SOLO LOCAL)
# Puerto 8883: MQTT + TLS (REMOTO CON CERTIFICADOS)

# LISTENERS - CONFIGURACIÓN CORREGIDA

# Listener 1: MQTT Plain (solo localhost, sin TLS)
listener 1883 127.0.0.1
protocol mqtt
allow_anonymous false

# Listener 2: MQTT TLS (acceso remoto, con TLS)
listener 8883 0.0.0.0
protocol mqtt
certfile /mosquitto/certs/server.crt
keyfile /mosquitto/certs/server.key
cafile /mosquitto/certs/ca.crt
allow_anonymous false
tls_version tlsv1.2

# CONFIGURACIONES PER-LISTENER (SOLUCIONA DUPLICADO)
per_listener_settings true

# Password file para AMBOS listeners (SIN DUPLICADOS)
password_file /mosquitto/config/passwd

# PERSISTENCIA
persistence true
persistence_location /mosquitto/data/

# LOGGING
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all
log_timestamp true

# SEGURIDAD
max_connections 100
max_queued_messages 1000
message_size_limit 0

# PERFORMANCE
autosave_interval 1800
