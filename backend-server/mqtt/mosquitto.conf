# Mosquitto MQTT Broker
# Puerto 1883: Plain MQTT (SOLO LOCAL)
# Puerto 8883: MQTT + TLS (REMOTO)

# CONFIGURACIÓN GLOBAL
allow_anonymous false
password_file /mosquitto/config/passwd


# LISTENERS
# Listener 1: MQTT Plain (localhost only - Node-RED, InfluxDB)
listener 1883 127.0.0.1
protocol mqtt
max_connections 50


# Listener 2: MQTT TLS (remote access - Bastión)
listener 8883 0.0.0.0
protocol mqtt
certfile /mosquitto/certs/server.crt
keyfile /mosquitto/certs/server.key
cafile /mosquitto/certs/ca.crt
tls_version tlsv1.2
max_connections 50


# PERSISTENCIA
persistence true
persistence_location /mosquitto/data/
autosave_interval 1800


# GESTIÓN DE CONEXIONES (Anti-spam PINGREQ)
# Tiempo máximo de inactividad antes de desconectar (segundos)
keepalive_interval 60

# Evitar client_ids duplicados (desconecta la antigua)
allow_duplicate_clientids false

# Expiración de sesiones persistentes
persistent_client_expiration 1h

# Límite de conexiones por listener
max_connections 50

# Máximo de mensajes en cola
max_queued_messages 1000

# Tamaño máximo de mensaje (0 = ilimitado)
message_size_limit 0


# LOGGING (Reducido para evitar spam)
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout

# Tipos de log (sin "information" para evitar PINGREQ spam)
log_type error
log_type warning
log_type notice
log_type connection
log_type disconnect
log_type subscribe
log_type unsubscribe
log_type publish

log_timestamp true

# Limitar conexiones por IP
# max_connections_per_client 1

EOF
