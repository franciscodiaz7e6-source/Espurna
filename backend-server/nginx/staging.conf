# =============================================================
# NGINX CONFIG - STAGING
# ProjecteEspVRna IoT
# Puerto host: 18080 → nginx:80
# =============================================================

server {
    listen 80;
    server_name staging.localhost localhost;

    # Header identificador de entorno
    add_header X-Environment "staging" always;
    add_header X-Robots-Tag "noindex, nofollow" always;

    # ----------------------------------------
    # Basic Auth global (protege todo el entorno staging)
    # Genera htpasswd: htpasswd -c nginx/staging_htpasswd staging
    # Contraseña por defecto de ejemplo: staging123
    # ----------------------------------------
    auth_basic "Staging Environment - Acceso restringido";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # ----------------------------------------
    # HOME ASSISTANT
    # ----------------------------------------
    location / {
        proxy_pass http://staging-homeassistant:8123/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Environment staging;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /api/websocket {
        proxy_pass http://staging-homeassistant:8123/api/websocket;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        # Basic auth desactivado para websockets HA
        auth_basic off;
    }

    # ----------------------------------------
    # NODE-RED - STAGING
    # ----------------------------------------
    location /nodered/ {
        proxy_pass http://staging-node-red:1880/nodered/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Environment staging;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ----------------------------------------
    # GRAFANA - STAGING
    # ----------------------------------------
    location /grafana/ {
        proxy_pass http://staging-grafana:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Environment staging;
    }

    # ----------------------------------------
    # INFLUXDB API - STAGING
    # ----------------------------------------
    location /influxdb/ {
        proxy_pass http://staging-influxdb:8086/;
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Headers' 'Authorization,Content-Type,Accept';
            add_header 'Access-Control-Allow-Methods' 'GET,POST,OPTIONS';
            add_header 'Content-Length' 0;
            return 204;
        }
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization,Content-Type,Accept' always;
        add_header 'Access-Control-Allow-Methods' 'GET,POST,OPTIONS' always;
    }

    # ----------------------------------------
    # WEB FIRESENSE - STAGING
    # ----------------------------------------
    location /FireSense/ {
        alias /usr/share/nginx/html/;
        index home.html;
        add_header X-Environment "staging" always;
    }

    # ----------------------------------------
    # WEB ESPVRNA - STAGING
    # ----------------------------------------
    location /Espvrna/ {
        alias /usr/share/nginx/html-espurna/;
        index home.html;
        add_header X-Environment "staging" always;
    }

    # ----------------------------------------
    # PROXIES APIs EXTERNAS (igual que producción)
    # ----------------------------------------
    location /overpass/ {
        auth_basic off;
        proxy_pass https://overpass-api.de/api/;
        proxy_set_header Host overpass-api.de;
        proxy_ssl_server_name on;
        proxy_read_timeout 60s;
        proxy_connect_timeout 15s;
        proxy_method POST;
        proxy_set_header Content-Type "application/x-www-form-urlencoded";
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type' always;
    }

    location /elevation/ {
        auth_basic off;
        proxy_pass https://api.opentopodata.org/v1/;
        proxy_set_header Host api.opentopodata.org;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type,Accept' always;
    }

    location /firms {
        auth_basic off;
        rewrite ^/firms/(.*)$ /nodered/api/firms/$1 break;
        rewrite ^/firms$ /nodered/api/firms/ break;
        proxy_pass http://staging-node-red:1880;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
        add_header 'Access-Control-Allow-Origin' '*' always;
    }

    location /open-meteo {
        auth_basic off;
        rewrite ^/open-meteo(.*)$ /nodered/api/open-meteo$1 break;
        proxy_pass http://staging-node-red:1880;
        proxy_set_header Host $host;
        proxy_read_timeout 30s;
        add_header 'Access-Control-Allow-Origin' '*' always;
    }

    location /nasa-power {
        auth_basic off;
        rewrite ^/nasa-power(.*)$ /nodered/api/nasa-power$1 break;
        proxy_pass http://staging-node-red:1880;
        proxy_set_header Host $host;
        proxy_read_timeout 30s;
        add_header 'Access-Control-Allow-Origin' '*' always;
    }

    location /aemet {
        auth_basic off;
        rewrite ^/aemet(.*)$ /nodered/api/aemet$1 break;
        proxy_pass http://staging-node-red:1880;
        proxy_set_header Host $host;
        proxy_read_timeout 30s;
        add_header 'Access-Control-Allow-Origin' '*' always;
    }
}
