server {
    listen 80;
    server_name f0929359-581e-4924-906b.353de71f3930.isard.nuvulet.itb.cat;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name f0929359-581e-4924-906b.353de71f3930.isard.nuvulet.itb.cat;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    location = / { return 301 /Espvrna/; }

    location /Espvrna/ {
        alias /usr/share/nginx/html/;
        index home.html;
        add_header Accept-Ranges bytes;
    }

    location /ha {
        proxy_pass http://homeassistant:8123/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /api/websocket {
        proxy_pass http://homeassistant:8123/api/websocket;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /nodered/ {
        proxy_pass http://node-red:1880/nodered/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /grafana/ {
        proxy_pass http://grafana:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /chirpstack/ {
        proxy_pass http://chirpstack-rest-api:8090/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /influxdb/ {
        proxy_pass http://influxdb:8086/;
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Headers' 'Authorization,Content-Type,Accept';
            add_header 'Access-Control-Allow-Methods' 'GET,POST,OPTIONS';
            add_header 'Content-Length' 0;
            return 204;
        }
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization,Content-Type,Accept' always;
        add_header 'Access-Control-Allow-Methods' 'GET,POST,OPTIONS' always;
    }

    location /secure/influx/ {
        proxy_pass http://influxdb:8086/;
        proxy_set_header Authorization "Token REDACTED";
        proxy_hide_header Authorization;
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET,POST,OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type,Accept' always;
        if ($request_method = 'OPTIONS') { return 204; }
    }

    location /chirpstack-api/ {
        proxy_pass http://chirpstack-rest-api:8090/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization,Content-Type' always;
    }

    location /secure/chirpstack/ {
        proxy_pass http://chirpstack-rest-api:8090/;
        proxy_set_header Authorization "Bearer eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJhdWQiOiJjaGlycHN0YWNrIiwiaXNzIjoiY2hpcnBzdGFjayIsInN1YiI6IjA2Y2ViMGE3LWZkN2YtNGMyYi1hMjRkLTczMjFlYWQyMWJkMCIsInR5cCI6ImtleSJ9.4uUjS9v-HxGAAO6NBy1LvJ6FAXUXIbDlmF6_5YcXKzc";
        proxy_hide_header Authorization;
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type' always;
    }

    location /overpass/ {
        proxy_pass https://overpass-api.de/api/;
        proxy_set_header Host overpass-api.de;
        proxy_ssl_server_name on;
        proxy_read_timeout 60s;
        proxy_connect_timeout 15s;
        proxy_method POST;
        proxy_set_header Content-Type "application/x-www-form-urlencoded";
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type' always;
    }

    location /elevation/ {
        proxy_pass https://api.opentopodata.org/v1/;
        proxy_set_header Host api.opentopodata.org;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type,Accept' always;
    }

    location /firms {
        rewrite ^/firms/(.*)$ /nodered/api/firms/$1 break;
        rewrite ^/firms$ /nodered/api/firms/ break;
        proxy_pass http://node-red:1880;
        proxy_set_header Host $host;
        proxy_read_timeout 30s;
        add_header 'Access-Control-Allow-Origin' '*' always;
    }

    location /nasa-power { rewrite ^/nasa-power(.*)$ /nodered/api/nasa-power$1 break; proxy_pass http://node-red:1880; proxy_set_header Host $host; proxy_read_timeout 30s; add_header 'Access-Control-Allow-Origin' '*' always; }
    location /nasa-eonet { rewrite ^/nasa-eonet(.*)$ /nodered/api/nasa-eonet$1 break; proxy_pass http://node-red:1880; proxy_set_header Host $host; proxy_read_timeout 30s; add_header 'Access-Control-Allow-Origin' '*' always; }
    location /nasa-ndvi  { rewrite ^/nasa-ndvi(.*)$  /nodered/api/nasa-ndvi$1  break; proxy_pass http://node-red:1880; proxy_set_header Host $host; proxy_read_timeout 30s; add_header 'Access-Control-Allow-Origin' '*' always; }
    location /nasa-burned { rewrite ^/nasa-burned(.*)$ /nodered/api/nasa-burned$1 break; proxy_pass http://node-red:1880; proxy_set_header Host $host; proxy_read_timeout 30s; add_header 'Access-Control-Allow-Origin' '*' always; }
    location /open-meteo { rewrite ^/open-meteo(.*)$ /nodered/api/open-meteo$1 break; proxy_pass http://node-red:1880; proxy_set_header Host $host; proxy_read_timeout 30s; add_header 'Access-Control-Allow-Origin' '*' always; }
    location /open-aq    { rewrite ^/open-aq(.*)$    /nodered/api/open-aq$1    break; proxy_pass http://node-red:1880; proxy_set_header Host $host; proxy_read_timeout 30s; add_header 'Access-Control-Allow-Origin' '*' always; }
    location /aemet      { rewrite ^/aemet(.*)$      /nodered/api/aemet$1      break; proxy_pass http://node-red:1880; proxy_set_header Host $host; proxy_read_timeout 30s; add_header 'Access-Control-Allow-Origin' '*' always; }
    location /wind-grid  { rewrite ^/wind-grid(.*)$  /nodered/api/wind-grid$1  break; proxy_pass http://node-red:1880; proxy_set_header Host $host; proxy_read_timeout 30s; add_header 'Access-Control-Allow-Origin' '*' always; }

    location /rpi-ping {
        proxy_pass http://100.89.52.39:5051/ping;
        proxy_set_header Host $host;
        proxy_read_timeout 5s;
        proxy_connect_timeout 3s;
        add_header 'Access-Control-Allow-Origin' '*' always;
    }

    location /screenshot/ {
        proxy_pass http://172.17.0.1:3001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type' always;
        add_header 'Access-Control-Allow-Methods' 'GET,POST,OPTIONS' always;
    }
}
