server {
    listen 80;
    server_name f5bd4ae6-64ea-466d-990b.372acb14d1b3.isard.nuvulet.itb.cat firesense.nuvulet.eu;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name f5bd4ae6-64ea-466d-990b.372acb14d1b3.isard.nuvulet.itb.cat firesense.nuvulet.eu;

    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    location /static/ {
        set $backend "http://homeassistant:8123";
        set $backend_host $host;
        if ($cookie_rakmode = "1") {
            set $backend "https://10.0.0.28";
            set $backend_host "10.0.0.28";
        }
        proxy_pass $backend/static/;
        proxy_ssl_verify off;
        proxy_set_header Host $backend_host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # HOME ASSISTANT EN LA RAÍZ
    location /ha {
        proxy_pass http://homeassistant:8123/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # HOME ASSISTANT API
    location /api/websocket {
        proxy_pass http://homeassistant:8123/api/websocket;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }


    location /api/services {
        proxy_pass http://homeassistant:8123/api/services;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/events {
        proxy_pass http://homeassistant:8123/api/events;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/config {
        proxy_pass http://homeassistant:8123/api/config;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # RAK API
    location /rak-api/ {
        proxy_pass https://10.0.0.28/api/;
        proxy_ssl_verify off;
        proxy_set_header Host 10.0.0.28;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
    }

    location = / {
    return 301 /FireSense/;
    }

    # RAK WisGate - frontend
    location = /rak {
        add_header Set-Cookie "rakmode=1; Path=/; SameSite=Lax" always;
        return 302 /rak/;
    }

    location /rak/ {
        add_header Set-Cookie "rakmode=1; Path=/; SameSite=Lax" always;
        proxy_pass https://10.0.0.28/;
        proxy_ssl_verify off;
        proxy_set_header Host 10.0.0.28;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_set_header Accept-Encoding "";
        sub_filter_once off;
sub_filter_types text/javascript application/javascript text/css;
        sub_filter '/static/' '/rak-static/';
        sub_filter '"/api/' '"/rak-api/';
        sub_filter "'/api/" "'/rak-api/";
    }

    # RAK WisGate - archivos estáticos
    location /rak-static/ {
        proxy_pass https://10.0.0.28/static/;
        proxy_ssl_verify off;
        proxy_set_header Host 10.0.0.28;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
    }

    # RAK favicon
    location = /favicon.ico {
        proxy_pass https://10.0.0.28/favicon.ico;
        proxy_ssl_verify off;
        proxy_set_header Host 10.0.0.28;
    }

    # NODE-RED
    location /nodered/ {
        proxy_pass http://node-red:1880/nodered/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # CHIRPSTACK WEB
    location /chirpstack/ {
        proxy_pass http://chirpstack-rest-api:8090/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # TU WEB EN /FireSense/
    location /FireSense/ {
        alias /usr/share/nginx/html/;
        index home.html;
    }



    # TU WEB EN /Espvrna/
    location /Espvrna/ {
        alias /usr/share/nginx/html-espurna/;
        index home.html;
    }

    # SCREENSHOT SERVER
    location /screenshot/ {
        proxy_pass http://172.17.0.1:3001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type' always;
        add_header 'Access-Control-Allow-Methods' 'GET,POST,OPTIONS' always;
    }

    # OVERPASS PROXY (evita timeouts i CORS)
    location /overpass/ {
        proxy_pass https://overpass-api.de/api/;
        proxy_set_header Host overpass-api.de;
        proxy_ssl_server_name on;
        proxy_read_timeout 60s;
        proxy_connect_timeout 15s;
        proxy_method POST;
        proxy_set_header Content-Type "application/x-www-form-urlencoded";
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type' always;
    }

    # ELEVATION PROXY (evita CORS d'opentopodata)
    location /elevation/ {
        proxy_pass https://api.opentopodata.org/v1/;
        proxy_set_header Host api.opentopodata.org;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type,Accept' always;
    }

    # FIRMS PROXY (NASA fire data)
    location /firms {
        rewrite ^/firms/(.*)$ /nodered/api/firms/$1 break;
        rewrite ^/firms$ /nodered/api/firms/ break;
        proxy_pass http://node-red:1880;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
        add_header 'Access-Control-Allow-Origin' '*' always;
    }

    # NASA POWER PROXY
    location /nasa-power {
        rewrite ^/nasa-power(.*)$ /nodered/api/nasa-power$1 break;
        proxy_pass http://node-red:1880;
        proxy_set_header Host $host;
        proxy_read_timeout 30s;
        add_header 'Access-Control-Allow-Origin' '*' always;
    }

    # NASA EONET PROXY
    location /nasa-eonet {
        rewrite ^/nasa-eonet(.*)$ /nodered/api/nasa-eonet$1 break;
        proxy_pass http://node-red:1880;
        proxy_set_header Host $host;
        proxy_read_timeout 30s;
        add_header 'Access-Control-Allow-Origin' '*' always;
    }

    # NASA NDVI PROXY
    location /nasa-ndvi {
        rewrite ^/nasa-ndvi(.*)$ /nodered/api/nasa-ndvi$1 break;
        proxy_pass http://node-red:1880;
        proxy_set_header Host $host;
        proxy_read_timeout 30s;
        add_header 'Access-Control-Allow-Origin' '*' always;
    }

    # NASA NDVI PROXY
    # NASA BURNED AREA PROXY
    location /nasa-burned {
        rewrite ^/nasa-burned(.*)$ /nodered/api/nasa-burned$1 break;
        proxy_pass http://node-red:1880;
        proxy_set_header Host $host;
        proxy_read_timeout 30s;
        add_header 'Access-Control-Allow-Origin' '*' always;
    }

    # OPEN-METEO PROXY
    location /open-meteo {
        rewrite ^/open-meteo(.*)$ /nodered/api/open-meteo$1 break;
        proxy_pass http://node-red:1880;
        proxy_set_header Host $host;
        proxy_read_timeout 30s;
        add_header 'Access-Control-Allow-Origin' '*' always;
    }

    # OPENAQ PROXY
    location /open-aq {
        rewrite ^/open-aq(.*)$ /nodered/api/open-aq$1 break;
        proxy_pass http://node-red:1880;
        proxy_set_header Host $host;
        proxy_read_timeout 30s;
        add_header 'Access-Control-Allow-Origin' '*' always;
    }

    # AEMET PROXY
    location /aemet {
        rewrite ^/aemet(.*)$ /nodered/api/aemet$1 break;
        proxy_pass http://node-red:1880;
        proxy_set_header Host $host;
        proxy_read_timeout 30s;
        add_header 'Access-Control-Allow-Origin' '*' always;
    }

    # WIND GRID PROXY
    location /wind-grid {
        rewrite ^/wind-grid(.*)$ /nodered/api/wind-grid$1 break;
        proxy_pass http://node-red:1880;
        proxy_set_header Host $host;
        proxy_read_timeout 30s;
        add_header 'Access-Control-Allow-Origin' '*' always;
    }

    # GRAFANA
    location /grafana/ {
        proxy_pass http://grafana:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # CHIRPSTACK API
    location /chirpstack-api/ {
        proxy_pass http://chirpstack-rest-api:8090/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization,Content-Type' always;
    }

    # INFLUXDB API (solo queries, sin UI)
    location /influxdb/ {
        proxy_pass http://influxdb:8086/;
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Headers' 'Authorization,Content-Type,Accept';
            add_header 'Access-Control-Allow-Methods' 'GET,POST,OPTIONS';
            add_header 'Content-Length' 0;
            return 204;
        }
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization,Content-Type,Accept' always;
        add_header 'Access-Control-Allow-Methods' 'GET,POST,OPTIONS' always;
    }
}