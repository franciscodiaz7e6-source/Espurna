# =============================================================
# STAGING ENVIRONMENT - ProjecteEspVRna IoT
# =============================================================
# Uso: ./staging.sh up
# Requiere: .env.staging (copia de .env con valores de staging)
# IMPORTANTE: No modifica el entorno de producción.
# =============================================================

services:
  # ============================================
  # MQTT BROKER - STAGING (sin TLS para facilitar dev)
  # ============================================
  mosquitto:
    image: eclipse-mosquitto:2.0.22
    container_name: staging-mqtt-broker
    restart: unless-stopped
    hostname: staging-mqtt-broker
    ports:
      - "18883:1883"
    volumes:
      - ./mqtt/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mqtt/certs:/mosquitto/certs:ro
      - ./mqtt/passwd:/mosquitto/config/passwd:ro
      - mosquitto-data-staging:/mosquitto/data
      - mosquitto-logs-staging:/mosquitto/log
    environment:
      - TZ=Europe/Madrid
    networks:
      - staging-net
    healthcheck:
      test: ["CMD", "sh", "-c", "mosquitto_sub -h localhost -p 1883 -t test -C 1 --quiet || exit 0"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "com.espvrna.env=staging"
      - "com.espvrna.service=mqtt"

  # ============================================
  # HOME ASSISTANT - STAGING
  # ============================================
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: staging-homeassistant
    restart: unless-stopped
    hostname: staging-homeassistant
    ports:
      - "18123:8123"
    environment:
      - TZ=Europe/Madrid
    volumes:
      - ha-config-staging:/config
      - /etc/localtime:/etc/localtime:ro
    networks:
      - staging-net
    depends_on:
      mosquitto:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8123/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    labels:
      - "com.espvrna.env=staging"
      - "com.espvrna.service=homeassistant"

  # ============================================
  # INFLUXDB - STAGING
  # ============================================
  influxdb:
    image: influxdb:2.7-alpine
    container_name: staging-influxdb
    restart: unless-stopped
    hostname: staging-influxdb
    ports:
      - "18086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=${INFLUXDB_USER}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUXDB_PASSWORD}
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUXDB_ORG}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUXDB_BUCKET}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_ADMIN_TOKEN}
      - DOCKER_INFLUXDB_INIT_RETENTION=${INFLUXDB_RETENTION}
      - TZ=Europe/Madrid
      - INFLUXDB_HTTP_LOG_ENABLED=true
      - INFLUXDB_REPORTING_DISABLED=true
    volumes:
      - influxdb-data-staging:/var/lib/influxdb2
      - influxdb-config-staging:/etc/influxdb2
      - ./influxdb/init.sh:/docker-entrypoint-initdb.d/init.sh:ro
    networks:
      - staging-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "com.espvrna.env=staging"
      - "com.espvrna.service=influxdb"

  # ============================================
  # NODE-RED - STAGING
  # ============================================
  node-red:
    build: ./node-red
    container_name: staging-node-red
    restart: unless-stopped
    hostname: staging-node-red
    ports:
      - "11880:1880"
    environment:
      - NODE_RED_ENABLE_PROJECTS=true
      - NODE_RED_ENABLE_SAFE_MODE=false
      - TZ=Europe/Madrid
      - NODE_OPTIONS=--max-old-space-size=256
      - NODE_RED_LOG_LEVEL=debug
    volumes:
      - node-red-data-staging:/data
      - ./node-red/settings.js:/data/settings.js:ro
    networks:
      - staging-net
    depends_on:
      influxdb:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1880/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "com.espvrna.env=staging"
      - "com.espvrna.service=node-red"

  # ============================================
  # GRAFANA - STAGING
  # ============================================
  grafana:
    image: grafana/grafana:11.4.0
    container_name: staging-grafana
    restart: unless-stopped
    hostname: staging-grafana
    ports:
      - "13000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_SERVER_ROOT_URL=http://localhost:13000
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_LOG_LEVEL=debug
      - TZ=Europe/Madrid
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
      - INFLUXDB_ADMIN_TOKEN=${INFLUXDB_ADMIN_TOKEN}
      - GF_FEATURE_TOGGLES_ENABLE=publicDashboards
    volumes:
      - grafana-data-staging:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - staging-net
    depends_on:
      influxdb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "com.espvrna.env=staging"
      - "com.espvrna.service=grafana"

  # ============================================
  # NGINX - STAGING (reverse proxy)
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: staging-nginx
    restart: unless-stopped
    ports:
      - "18080:80"
    volumes:
      - ./nginx/staging.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/staging_htpasswd:/etc/nginx/.htpasswd:ro
      - ./mi-web-html-firesense:/usr/share/nginx/html:ro
      - ./mi-web-html-espurna:/usr/share/nginx/html-espurna:ro
    networks:
      - staging-net
    depends_on:
      - homeassistant
      - node-red
      - grafana
    labels:
      - "com.espvrna.env=staging"
      - "com.espvrna.service=nginx"

# ============================================
# RED AISLADA STAGING
# ============================================
networks:
  staging-net:
    driver: bridge
    name: staging-net
    ipam:
      config:
        - subnet: 172.21.0.0/16

# ============================================
# VOLÚMENES SEPARADOS (sufijo -staging)
# ============================================
volumes:
  mosquitto-data-staging:
    driver: local
  mosquitto-logs-staging:
    driver: local
  influxdb-data-staging:
    driver: local
  influxdb-config-staging:
    driver: local
  node-red-data-staging:
    driver: local
  grafana-data-staging:
    driver: local
  ha-config-staging:
    driver: local
